<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>喵喵與汪汪的Loop Woof Woof</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: #000;
        }

        body {
            width: 100vw;
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .frame {
            width: min(100vw, 500px);
            padding: 10px;
            margin: auto;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .box {
            aspect-ratio: 1;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(60px, 15vw, 130px);
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .box img.char-img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            pointer-events: none;
        }

        .box-locked {
            background: #1e1e2e !important;
            border-color: #333 !important;
            box-shadow: none !important;
            font-size: clamp(40px, 10vw, 90px);
            color: #555;
        }

        /* 跳動 */
        @keyframes bounce {
            0%   { transform: scale(1)    rotate(0deg); }
            20%  { transform: scale(1.25) rotate(-8deg); }
            40%  { transform: scale(0.9)  rotate(6deg); }
            60%  { transform: scale(1.15) rotate(-4deg); }
            80%  { transform: scale(0.95) rotate(2deg); }
            100% { transform: scale(1)    rotate(0deg); }
        }

        .char-display { display: inline-block; }
        .char-display.bouncing { animation: bounce 0.5s ease-out forwards; }

        /* 漣漪 */
        @keyframes ripple {
            0%   { transform: scale(0); opacity: 0.5; }
            100% { transform: scale(4); opacity: 0; }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            width: 100px;
            height: 100px;
            margin-top: -50px;
            margin-left: -50px;
            pointer-events: none;
            animation: ripple 0.55s ease-out forwards;
        }

        /* 閃光 */
        @keyframes flash {
            0%   { filter: brightness(1);   }
            30%  { filter: brightness(1.6); }
            100% { filter: brightness(1);   }
        }

        .box.flashing { animation: flash 0.45s ease-out forwards; }

        /* 符號動畫 */
        @keyframes symbol-pop {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2) rotate(-15deg); }
            28%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2)  rotate(6deg);  }
            58%  { opacity: 1; transform: translate(-50%, -50%) scale(1)    rotate(0deg);  }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5)  rotate(8deg);  }
        }

        .box-symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: min(42vw, 42dvh);
            line-height: 1;
            pointer-events: none;
            opacity: 0;
        }

        .box-symbol svg {
            width: min(42vw, 42dvh);
            height: min(42vw, 42dvh);
        }

        .box-symbol.popping {
            animation: symbol-pop 0.8s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="frame">
        <span id="egg" style="position:fixed;top:0;left:0;width:44px;height:44px;opacity:0;z-index:99;cursor:default;"></span>
        <div class="grid" id="grid"></div>
    </div>

    <script>
    const CAT_PAW_SVG = `<svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="28" r="13" fill="white" opacity="0.92"/>
        <circle cx="50" cy="18" r="13" fill="white" opacity="0.92"/>
        <circle cx="78" cy="28" r="13" fill="white" opacity="0.92"/>
        <ellipse cx="50" cy="72" rx="26" ry="22" fill="white"/>
    </svg>`;

    const SVG_MAP = { catpaw: CAT_PAW_SVG };

    (function(){
        var _e=document.getElementById('egg');
        var _k=[7,3,9,2,5],_d=[102,103,100,107,107,41,107,125,111,105];
        var _x=_d.map(function(c,i){return String.fromCharCode(c^_k[i%_k.length]);}).join('');
        var _n=Math.floor(Math.random()*9)+1,_c=0;
        function _t(){_c++;if(_c>=_n)location.href=_x;}
        _e.addEventListener('click',_t);
        _e.addEventListener('touchstart',function(ev){ev.preventDefault();_t();},{passive:false});
    })();

    fetch('animals.json')
        .then(r => r.json())
        .then(data => buildGrid(data.animals))
        .catch(() => console.error('載入 animals.json 失敗'));

    function buildGrid(animals) {
        const grid = document.getElementById('grid');
        animals.forEach(animal => grid.appendChild(createBox(animal)));
    }

    function createBox(animal) {
        const box = document.createElement('div');
        box.className = 'box' + (animal.locked ? ' box-locked' : '');
        if (!animal.locked) {
            box.style.cssText =
                `background: linear-gradient(145deg, ${animal.bgFrom}, ${animal.bgTo});` +
                `border-color: ${animal.border};` +
                `box-shadow: 0 0 20px ${animal.glow1}80, inset 0 1px 0 rgba(255,255,255,0.15);`;
        }

        // 顯示角色（圖片或 emoji）
        const charDisplay = document.createElement('span');
        charDisplay.className = 'char-display';
        if (animal.image) {
            const img = document.createElement('img');
            img.className = 'char-img';
            img.src = animal.image;
            img.alt = animal.id;
            charDisplay.appendChild(img);
        } else {
            charDisplay.textContent = animal.emoji || '❓';
        }
        box.appendChild(charDisplay);

        // 符號動畫層
        const symbol = document.createElement('span');
        symbol.className = 'box-symbol';
        symbol.style.filter =
            `drop-shadow(0 0 24px ${animal.glow1}) drop-shadow(0 0 48px ${animal.glow2})`;
        if (animal.symbolSvg && SVG_MAP[animal.symbolSvg]) {
            symbol.innerHTML = SVG_MAP[animal.symbolSvg];
        } else {
            symbol.textContent = animal.symbolEmoji || animal.emoji || '❓';
        }
        box.appendChild(symbol);

        const href = animal.locked ? null : `game.html?char=${animal.id}`;

        function handleTap(e) {
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = box.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ripple.style.left = x + 'px';
            ripple.style.top  = y + 'px';
            box.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());

            charDisplay.classList.remove('bouncing');
            void charDisplay.offsetWidth;
            charDisplay.classList.add('bouncing');

            box.classList.remove('flashing');
            void box.offsetWidth;
            box.classList.add('flashing');

            symbol.classList.remove('popping');
            void symbol.offsetWidth;
            symbol.classList.add('popping');

            if (href) setTimeout(() => { location.href = href; }, 820);
        }

        box.addEventListener('click', handleTap);
        box.addEventListener('touchstart', e => {
            e.preventDefault();
            handleTap(e);
        }, { passive: false });

        return box;
    }
    </script>
</body>
</html>
