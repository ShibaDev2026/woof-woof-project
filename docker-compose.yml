version: '3.8'
services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - .:/woof
      - /woof/node_modules
    environment:
      - NODE_ENV=development

  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

