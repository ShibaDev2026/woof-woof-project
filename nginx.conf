server {
    listen 3000;

    # /api/ 限制只允許本機存取（防止外部直接呼叫 admin API 與監控 API）
    # 127.0.0.1        = nginx 容器本身
    # 172.16.0.0/12    = Docker bridge 內部網路（涵蓋 172.16~31.x.x）
    # 192.168.65.0/24  = Docker Desktop for Mac host gateway IP（192.168.65.1）
    location /api/ {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 192.168.65.0/24;
        deny all;

        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # 一般靜態資源與遊戲頁面，對外開放
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
