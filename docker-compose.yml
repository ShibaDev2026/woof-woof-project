version: '3.8'
services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - .:/woof
      - /woof/node_modules
      - ./logs:/woof/logs       # 持久化爬蟲紀錄，container 重啟後不遺失
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

