<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汪汪 Woof Woof</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        canvas {
            width: min(100vw, 100dvh);
            height: min(100vw, 100dvh);
            display: block;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 22px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            z-index: 10;
        }

        #back-btn:active { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <button id="back-btn" onclick="location.href='index.html'">←</button>
    <canvas id="myCanvas" width="500" height="500"></canvas>
    <script src="app.js"></script>
</body>
</html>
